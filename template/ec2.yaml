AWSTemplateFormatVersion: '2010-09-09'
Description: Despliega una EC2 con Security Group puerto 80 y pagina web del estudiante.

Parameters:
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permite trafico HTTP en el puerto 80
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !Ref LatestAmiId
      SecurityGroups:
        - !Ref WebSecurityGroup
      Tags:
        - Key: Name
          Value: ExamenFinal-EC2
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          cat <<'EOF' > /var/www/html/index.html
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <title>Examen Final</title>
            <style>
              body { font-family: Arial, sans-serif; background: #0f172a; color: #f1f5f9; text-align: center; padding-top: 80px; }
              h1 { color: #38bdf8; }
              p { font-size: 20px; }
            </style>
            <script>
              window.onload = function() { console.log("Examen Final - Arq de PC"); };
            </script>
          </head>
          <body>
            <h1>Examen Final Arquitectura de Computadores</h1>
            <p><strong>Nombre:</strong> Kevin Perez</p>
            <p><strong>Codigo:</strong> 0192388</p>
          </body>
          </html>
          EOF

Outputs:
  PublicIP:
    Value: !GetAtt WebServerInstance.PublicIp
  PublicURL:
    Value: !Sub "http://${WebServerInstance.PublicIp}"